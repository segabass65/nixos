[bar/bspwm-DP-2]
inherit = bar/bspwm

monitor = DP-2
modules-center = bspwm-tray

[bar/bspwm-DP-0]
inherit = bar/bspwm

monitor = DP-0

[bar/bspwm]
modules-left = arch bspwm-workspaces
modules-right = bspwm-flags bspwm-keyboard bspwm-date

background = #11111b
border-color = #45475a
foreground = #cdd6f4

border-top-size = 2px
height = 20px
bottom = true

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
wm-restack = bspwm

[module/arch]
type = custom/text

label = "   "
label-background = #181825

[module/bspwm-workspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = " %name% "
label-active-background = #cba6f7
label-active-foreground = #11111b

label-occupied = " %name% "
label-occupied-background = #181825

label-empty =

[module/bspwm-tray]
type = internal/tray

tray-size = 100%
tray-spacing = 20px

[module/bspwm-flags]
type = internal/bspwm

format = <label-mode>

label-monocle = " 󰥶 "
label-monocle-background = #89b4fa
label-monocle-foreground = #11111b

label-locked = "  "
label-locked-background = #f38ba8
label-locked-foreground = #11111b

label-sticky = "  "
label-sticky-background = #fab387
label-sticky-foreground = #11111b

label-private = "  "
label-private-background = #fab387
label-private-foreground = #11111b

label-marked = " 󰄵 "
label-marked-background = #a6e3a1
label-marked-foreground = #11111b

[module/bspwm-keyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout><label-indicator>

label-layout = "   %layout% "
label-layout-background = #181825

label-indicator-on-capslock = " 󰌎 "
label-indicator-on-capslock-background = #cba6f7
label-indicator-on-capslock-foreground = #11111b

[module/bspwm-date]
type = internal/date

time = %H:%M

label = " 󱑎 %time% "
label-background = #181825
